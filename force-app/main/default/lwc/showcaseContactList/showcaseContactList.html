<template>
  <lightning-card title="Recent Contacts" icon-name="standard:contact">
    <template if:true={errorMessage}>
      <div
        class="slds-p-horizontal_medium slds-p-bottom_medium slds-text-color_error"
      >
        {errorMessage}
      </div>
    </template>

    <template if:true={hasContacts}>
      <lightning-datatable
        key-field="contactId"
        data={contacts}
        columns={columns}
        hide-checkbox-column
      ></lightning-datatable>
    </template>

    <template if:false={hasContacts}>
      <div class="slds-p-horizontal_medium slds-p-bottom_medium">
        No contacts available yet.
      </div>
    </template>
  </lightning-card>
</template>
